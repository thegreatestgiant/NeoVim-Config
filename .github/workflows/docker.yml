name: Build and Push Neovim Docker Image

on:
  push:
    branches:
      - '**' # Triggers on any push to any branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags it with both the run number and 'latest'
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nvim:${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/nvim:latest
